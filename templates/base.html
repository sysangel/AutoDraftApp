<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}draft.ai{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">draft.ai</div>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/messages">All Messages</a>
      <a href="/settings">Settings</a>
      <a href="/health">Health</a>
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>draft.ai reads your inbox and creates draft replies. It never sends email.</p>
  </footer>
</body>
</html>
